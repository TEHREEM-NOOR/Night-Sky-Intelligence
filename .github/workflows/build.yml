name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python deps
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest tests/ -v

  build-mac:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: cd gui && npm install
      - name: Build React
        run: cd gui && npm run build
      - name: Build Electron
        run: cd gui && npx electron-builder --mac
        env:
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
      - uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: gui/dist-electron/*.dmg

  build-win:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: cd gui && npm install
      - name: Build React
        run: cd gui && npm run build
      - name: Build Electron
        run: cd gui && npx electron-builder --win
        env:
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
      - uses: actions/upload-artifact@v4
        with:
          name: win-build
          path: gui/dist-electron/*.exe

  build-linux:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: cd gui && npm install
      - name: Build React
        run: cd gui && npm run build
      - name: Build Electron
        run: cd gui && npx electron-builder --linux
        env:
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: gui/dist-electron/*.AppImage